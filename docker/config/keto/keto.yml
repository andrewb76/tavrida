version: v0.14.0

log:
  level: info

namespaces:
  location: file://./namespaces.ts

# Postgres schema `keto` in `tavrida_lot` (host `postgres` = service on tavrida-local network).
# Override with `dsn: memory` only for ephemeral tests without infra.
dsn: postgres://postgres:postgres@postgres:5432/tavrida_lot?sslmode=disable&search_path=keto

serve:
  read:
    host: 0.0.0.0
    port: 4466
  write:
    host: 0.0.0.0
    port: 4467
