version: v0.14.0

log:
  level: info

# Explicit namespace list (reliable in Swarm). OPL model for docs/local experiments:
# docker/config/keto/namespaces.ts — use `location: file:///home/ory/namespaces.ts` when enabling OPL.
namespaces:
  - id: 0
    name: TavridaLot

# Postgres schema `keto` in `tavrida_lot` (host `postgres` = service on Swarm network).
# Password must match Swarm secret `tavrida_dev_postgres_password` (dev default: postgres).
# Override with `dsn: memory` only for ephemeral tests without infra.
dsn: postgres://postgres:postgres@postgres:5432/tavrida_lot?sslmode=disable&search_path=keto

serve:
  read:
    host: 0.0.0.0
    port: 4466
  write:
    host: 0.0.0.0
    port: 4467
