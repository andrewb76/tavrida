# Platform infra — local dev only (NOT for production)
#
# Matches repo root `.env.example` defaults:
#   PostgreSQL  localhost:5432  postgres/postgres  db=tavrida_lot
#   Redis       localhost:6379
#   RabbitMQ    localhost:5672  guest/guest
#   MinIO       localhost:9000  minioadmin/minioadmin
#   imgproxy    localhost:8080  (resize / WebP for MinIO media)
#   Keto        localhost:4466 (read) / 4467 (write) — schema `keto` in Postgres
#
# Start: docker compose -f docker/compose/infra.local.yml up -d
# Stop:  docker compose -f docker/compose/infra.local.yml down
# Logs:  docker compose -f docker/compose/infra.local.yml logs -f postgres
# Keto only: docker compose -f docker/compose/infra.local.yml up -d keto
# Or: pnpm keto:up
#
# Bootstrap first admin (after login — copy Logto sub from /profile/me):
#   pnpm grant:admin <logto_sub>
#
# Shared network for app services: tavrida-local

name: tavrida-infra

networks:
  tavrida:
    name: tavrida-local
    driver: bridge

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tavrida_lot
    volumes:
      - tavrida_pg_data:/var/lib/postgresql/data
      - ../config/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - tavrida
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tavrida_lot']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - tavrida
    volumes:
      - tavrida_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - tavrida
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - tavrida_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    networks:
      - tavrida
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - tavrida_minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  imgproxy:
    image: darthsim/imgproxy:latest
    ports:
      - '8080:8080'
    networks:
      - tavrida
    environment:
      IMGPROXY_BIND: ':8080'
      IMGPROXY_USE_ETAG: 'true'
      IMGPROXY_ENABLE_WEBP_DETECTION: 'true'
      IMGPROXY_JPEG_PROGRESSIVE: 'true'
      IMGPROXY_MAX_SRC_RESOLUTION: '50'
    depends_on:
      minio:
        condition: service_healthy

  # Ory Keto — relation tuples in Postgres schema `keto` (survives container recreate).
  keto-schema-init:
    image: postgres:17-alpine
    networks:
      - tavrida
    environment:
      PGPASSWORD: postgres
    entrypoint: ['sh', '-c']
    command:
      - |
        until pg_isready -h postgres -U postgres -d tavrida_lot; do sleep 1; done
        psql -h postgres -U postgres -d tavrida_lot -c 'CREATE SCHEMA IF NOT EXISTS keto;'
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  keto-migrate:
    image: oryd/keto:v0.14.0
    working_dir: /home/ory
    networks:
      - tavrida
    command: migrate up -y -c keto.yml
    volumes:
      - type: bind
        source: ../config/keto
        target: /home/ory
    depends_on:
      keto-schema-init:
        condition: service_completed_successfully
    restart: 'no'

  keto:
    image: oryd/keto:v0.14.0
    working_dir: /home/ory
    ports:
      - '4466:4466'
      - '4467:4467'
    networks:
      - tavrida
    command: serve -c keto.yml
    restart: on-failure
    volumes:
      - type: bind
        source: ../config/keto
        target: /home/ory
    depends_on:
      keto-migrate:
        condition: service_completed_successfully

volumes:
  tavrida_pg_data:
  tavrida_redis_data:
  tavrida_rabbitmq_data:
  tavrida_minio_data:
