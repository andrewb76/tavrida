# Novu Community Edition — local self-host (NOT for production)
#
# Separate from infra.local.yml (like logto.local.yml). Merge into infra later if OK.
# Based on: https://github.com/novuhq/novu/tree/next/docker/community (images 3.18.0)
#
# Why self-host: Novu Cloud unavailable in Crimea / geo constraints — see ADR-019.
#
# Ports (host):
#   Dashboard  http://localhost:4000
#   API        http://localhost:3020  (container :3000 — avoids conflict with BFF)
#   WS         http://localhost:3022  (container :3002 — avoids conflict with plan-config)
#
# After first start — see docs/04-deployment/novu-local.md:
#   1. http://localhost:4000 — org / admin
#   2. Settings → API Keys → .env.local NOVU_API_KEY
#      (NOVU_SECRET_KEY in novu.local.env ≠ ApiKey for triggers)
#   3. NOVU_API_URL=http://localhost:3020
#   4. Create workflow trigger identifier `tag-content`
#
# Start:  pnpm novu:up
#         docker compose -f docker/compose/novu.local.yml --env-file docker/compose/novu.local.env up -d
# Stop:   docker compose -f docker/compose/novu.local.yml --env-file docker/compose/novu.local.env down
# Logs:   docker compose -f docker/compose/novu.local.yml logs -f novu-api

name: tavrida-novu

services:
  novu-redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - tavrida_novu_redis:/data

  novu-mongo:
    image: mongo:8.0.17
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - tavrida_novu_mongo:/data/db
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--quiet',
          '--username',
          '${MONGO_INITDB_ROOT_USERNAME}',
          '--password',
          '${MONGO_INITDB_ROOT_PASSWORD}',
          '--eval',
          "db.adminCommand('ping').ok",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  novu-api:
    image: ghcr.io/novuhq/novu/api:3.18.0
    depends_on:
      novu-mongo:
        condition: service_healthy
      novu-redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '3020:3000'
    environment:
      NODE_ENV: ${NODE_ENV}
      API_ROOT_URL: ${API_ROOT_URL}
      PORT: ${API_PORT}
      FRONT_BASE_URL: ${FRONT_BASE_URL}
      MONGO_URL: ${MONGO_URL}
      MONGO_MIN_POOL_SIZE: ${MONGO_MIN_POOL_SIZE}
      MONGO_MAX_POOL_SIZE: ${MONGO_MAX_POOL_SIZE}
      MONGO_AUTO_CREATE_INDEXES: ${MONGO_AUTO_CREATE_INDEXES}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB_INDEX: 2
      REDIS_CACHE_SERVICE_HOST: ${REDIS_CACHE_SERVICE_HOST}
      REDIS_CACHE_SERVICE_PORT: ${REDIS_CACHE_SERVICE_PORT}
      S3_LOCAL_STACK: ${S3_LOCAL_STACK}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      JWT_SECRET: ${JWT_SECRET}
      STORE_ENCRYPTION_KEY: ${STORE_ENCRYPTION_KEY}
      NOVU_SECRET_KEY: ${NOVU_SECRET_KEY}
      SUBSCRIBER_WIDGET_JWT_EXPIRATION_TIME: ${SUBSCRIBER_WIDGET_JWT_EXPIRATION_TIME}
      SENTRY_DSN: ${SENTRY_DSN}
      NEW_RELIC_ENABLED: ${NEW_RELIC_ENABLED}
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      IS_API_IDEMPOTENCY_ENABLED: ${IS_API_IDEMPOTENCY_ENABLED}
      IS_API_RATE_LIMITING_ENABLED: ${IS_API_RATE_LIMITING_ENABLED}
      IS_NEW_MESSAGES_API_RESPONSE_ENABLED: ${IS_NEW_MESSAGES_API_RESPONSE_ENABLED}
      IS_V2_ENABLED: ${IS_V2_ENABLED}
      IS_SELF_HOSTED: ${IS_SELF_HOSTED}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:$${PORT}/v1/health-check || exit 1',
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  novu-worker:
    image: ghcr.io/novuhq/novu/worker:3.18.0
    depends_on:
      novu-mongo:
        condition: service_healthy
      novu-redis:
        condition: service_healthy
      novu-api:
        condition: service_healthy
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${WORKER_PORT}
      MONGO_URL: ${MONGO_URL}
      MONGO_MIN_POOL_SIZE: ${MONGO_MIN_POOL_SIZE}
      MONGO_MAX_POOL_SIZE: ${MONGO_MAX_POOL_SIZE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB_INDEX: 2
      REDIS_CACHE_SERVICE_HOST: ${REDIS_CACHE_SERVICE_HOST}
      REDIS_CACHE_SERVICE_PORT: ${REDIS_CACHE_SERVICE_PORT}
      S3_LOCAL_STACK: ${S3_LOCAL_STACK}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      STORE_ENCRYPTION_KEY: ${STORE_ENCRYPTION_KEY}
      SUBSCRIBER_WIDGET_JWT_EXPIRATION_TIME: ${SUBSCRIBER_WIDGET_JWT_EXPIRATION_TIME}
      SENTRY_DSN: ${SENTRY_DSN}
      NEW_RELIC_ENABLED: ${NEW_RELIC_ENABLED}
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      BROADCAST_QUEUE_CHUNK_SIZE: ${BROADCAST_QUEUE_CHUNK_SIZE}
      MULTICAST_QUEUE_CHUNK_SIZE: ${MULTICAST_QUEUE_CHUNK_SIZE}
      API_ROOT_URL: http://novu-api:${API_PORT}
      IS_EMAIL_INLINE_CSS_DISABLED: ${IS_EMAIL_INLINE_CSS_DISABLED}
      IS_USE_MERGED_DIGEST_ID_ENABLED: ${IS_USE_MERGED_DIGEST_ID_ENABLED}
      IS_SELF_HOSTED: ${IS_SELF_HOSTED}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:$${PORT:-3004}/v1/health-check || exit 1',
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  novu-ws:
    image: ghcr.io/novuhq/novu/ws:3.18.0
    depends_on:
      novu-mongo:
        condition: service_healthy
      novu-redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '3022:3002'
    environment:
      PORT: ${WS_PORT}
      NODE_ENV: ${NODE_ENV}
      MONGO_URL: ${MONGO_URL}
      MONGO_MIN_POOL_SIZE: ${MONGO_MIN_POOL_SIZE}
      MONGO_MAX_POOL_SIZE: ${MONGO_MAX_POOL_SIZE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NEW_RELIC_ENABLED: ${NEW_RELIC_ENABLED}
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:$${PORT}/v1/health-check || exit 1',
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  novu-dashboard:
    image: ghcr.io/novuhq/novu/dashboard:3.18.0
    depends_on:
      novu-api:
        condition: service_healthy
      novu-worker:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      VITE_API_HOSTNAME: ${VITE_API_HOSTNAME}
      VITE_WEBSOCKET_HOSTNAME: ${VITE_WEBSOCKET_HOSTNAME}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "const http=require(\"http\");const r=http.get({hostname:\"localhost\",port:4000,path:\"/\",timeout:5000},res=>process.exit(res.statusCode===200?0:1));r.on(\"error\",()=>process.exit(1));"',
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  tavrida_novu_mongo:
  tavrida_novu_redis:
