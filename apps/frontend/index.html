<!doctype html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Таврида Лот</title>
    <link
      rel="icon"
      href="/branding/tavrida-mark.svg"
      type="image/svg+xml"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=Unbounded:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var t = localStorage.getItem('tavrida-theme');
        if (!t && window.matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
        document.documentElement.dataset.theme = t || 'light';
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
