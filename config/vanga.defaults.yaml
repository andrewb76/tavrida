# Oracle — defaults & ranges for revenue forecast (founder-only tool)
# Edit manually before/after meetings. Not production settings.
# Spec: docs/05-microservices/oracle/oracle-config.md
# v0.1 — placeholders; finalize on business review

version: "0.1"
currency: RUB

# ── Built-in scenario presets (UI: compare up to 3 on one chart) ─────────────
scenarios:
  base:
    label: Базовый
    description: Умеренный рост, средняя активность
  optimistic:
    label: Оптимистичный
    description: Выше регистрации и конверсия в платные планы
  pessimistic:
    label: Пессимистичный
    description: Низкий приток, высокий churn

# ── Simulation horizon ─────────────────────────────────────────────────────
period:
  defaultMonths: 12
  minMonths: 1
  maxMonths: 36
  granularity: month

# ── Growth model (registrations) ───────────────────────────────────────────
# UI: pick curve; sliders set parameters. Improves forecast vs flat linear only.
growth:
  models: [linear, exponential, logistic_s_curve]
  defaultModel: linear
  linear:
    registrationsPerMonth: { min: 0, max: 500, default: 40, step: 5 }
  exponential:
    registrationsMonth1: { min: 0, max: 200, default: 20, step: 5 }
    monthlyGrowthRatePercent: { min: 0, max: 30, default: 8, step: 0.5 }
  logistic_s_curve:
    carryingCapacity: { min: 100, max: 50000, default: 3000, step: 100 }
    inflectionMonth: { min: 3, max: 24, default: 9, step: 1 }
    steepness: { min: 0.1, max: 2, default: 0.8, step: 0.1 }

# ── Cohort & plans ─────────────────────────────────────────────────────────
cohort:
  planMix:
    free:  { min: 0, max: 100, default: 70, unit: percent }
    basic: { min: 0, max: 100, default: 25, unit: percent }
    pro:   { min: 0, max: 100, default: 5, unit: percent }
    # UI normalizes to 100%
  monthlyChurnRatePercent: { min: 0, max: 25, default: 5, step: 0.5 }
  autoRenewRatePercent:    { min: 0, max: 100, default: 60, step: 5 }
  yearlyBillingSharePercent: { min: 0, max: 50, default: 15, step: 5 }

# ── Upgrade funnel (Free → paid) ───────────────────────────────────────────
conversion:
  freeToBasicMonthlyPercent: { min: 0, max: 30, default: 3, step: 0.5 }
  freeToProMonthlyPercent:     { min: 0, max: 10, default: 0.5, step: 0.1 }
  basicToProMonthlyPercent:    { min: 0, max: 15, default: 1, step: 0.5 }
  trialBasicDays:              { min: 0, max: 30, default: 0, step: 1 }

# ── Deposits (cashflow → processor fee, not revenue) ───────────────────────
deposits:
  avgAmountRub: { min: 100, max: 50000, default: 500, step: 50 }
  eventsPerPayingUserPerMonth: { min: 0, max: 10, default: 1.2, step: 0.1 }
  shareOfUsersDepositingPercent: { min: 0, max: 100, default: 40, step: 5 }

# ── Refunds estimate (outflow) ─────────────────────────────────────────────
refunds:
  chargeRefundRatePercent: { min: 0, max: 10, default: 1, step: 0.5 }

# ── One-time marketing / launch spend ──────────────────────────────────────
marketing:
  launchCampaignOneTimeRub: { min: 0, max: 500000, default: 0, step: 5000 }
  monthlyAdsRub: { min: 0, max: 200000, default: 0, step: 1000 }

subscriptions:
  basic:
    monthlyPrice: { min: 0, max: 999, default: 99, step: 10 }
    yearlyPrice:  { min: 0, max: 9999, default: 990, step: 50 }
  pro:
    monthlyPrice: { min: 0, max: 2999, default: 399, step: 50 }
    yearlyPrice:  { min: 0, max: 29999, default: 3990, step: 100 }

# ── Activity → monetization attach rates ───────────────────────────────────
activity:
  auctionsCreatedPerUserPerMonth:
    byPlan:
      free:  { min: 0, max: 10, default: 0.5, step: 0.1 }
      basic: { min: 0, max: 20, default: 2, step: 0.5 }
      pro:   { min: 0, max: 50, default: 5, step: 0.5 }
  auctionPromotionAttachRatePercent:   { min: 0, max: 100, default: 10, step: 1 }
  auctionReserveAttachRatePercent:     { min: 0, max: 100, default: 5, step: 1 }
  auctionCustomPresetAttachRatePercent: { min: 0, max: 100, default: 3, step: 1 }
  forumPaidReactionPer100Topics:       { min: 0, max: 50, default: 2, step: 0.5 }
  forumTopicsPerUserPerMonth:
    byPlan:
      free:  { min: 0, max: 20, default: 0.3, step: 0.1 }
      basic: { min: 0, max: 40, default: 1, step: 0.2 }
      pro:   { min: 0, max: 80, default: 2.5, step: 0.5 }
  webhooksActiveConnections:
    byPlan:
      free:  { min: 0, max: 0, default: 0, step: 1 }
      basic: { min: 0, max: 2, default: 0.2, step: 0.1 }
      pro:   { min: 0, max: 10, default: 0.5, step: 0.1 }
  marketplaceOrdersPerUserPerMonth:
    byPlan:
      free:  { min: 0, max: 5, default: 0.1, step: 0.05 }
      basic: { min: 0, max: 10, default: 0.5, step: 0.1 }
      pro:   { min: 0, max: 20, default: 1.5, step: 0.1 }
  # Sales volume (GMV) — informational only, NOT platform revenue
  auctionSalesCountPerMonth: { min: 0, max: 1000, default: 15, step: 5 }
  auctionAvgSaleAmountRub:   { min: 0, max: 500000, default: 5000, step: 500 }

# ── One-time prices (override registry defaults) ───────────────────────────
oneTimePrices:
  auction.promotion:           { min: 0, max: 1000, default: 200, enabled: true }
  auction.reservePrice:        { min: 0, max: 500, default: 100, enabled: true }
  auction.customDurationPreset: { min: 0, max: 200, default: 50, enabled: true }
  forum.reaction.rocket:       { min: 0, max: 500, default: 100, enabled: true }
  forum.reaction.fire:         { min: 0, max: 500, default: 100, enabled: false }
  forum.reaction.brain:        { min: 0, max: 500, default: 100, enabled: false }
  marketplace.listingPromotion: { min: 0, max: 2000, default: 0, enabled: false }
  marketplace.platformFee:     { min: 0, max: 5000, default: 0, enabled: false }

# ── Referral (money) — default OFF; separate UI tab ────────────────────────
# Модели расчёта: docs/05-microservices/referral-rewards/requirements/referral-models-catalog.md
referral:
  programEnabled: { default: false }
  calculationModelId:
    default: revshare_single
    options:
      - id: revshare_single
        label: Доля от платежа (1 уровень)
      - id: revshare_multi_decay
        label: Многоуровневая с затуханием
      - id: cpa_first_charge
        label: Фикс за первую оплату
      - id: bilateral_first_sub
        label: Двусторонний бонус
  models:
    revshare_single:
      percentOfCharge: { min: 0, max: 50, default: 10, step: 1 }
    revshare_multi_decay:
      percentOfCharge: { min: 0, max: 30, default: 10, step: 1 }
      maxDepth: { min: 1, max: 3, default: 2, step: 1 }
    cpa_first_charge:
      fixedAmountRub: { min: 0, max: 5000, default: 500, step: 50 }
    bilateral_first_sub:
      inviterBonusRub: { min: 0, max: 3000, default: 300, step: 50 }
      inviteeBonusRub: { min: 0, max: 3000, default: 300, step: 50 }
  attachRatePercent: { min: 0, max: 100, default: 25, step: 5 }
  maxDepth: { min: 1, max: 5, default: 1, step: 1 }
  depthCoefficients: { default: [1.0, 0.3, 0.1] }
  enabledChargeCategories:
    default: [SUBSCRIPTION]
    options: [SUBSCRIPTION, AUCTION_SERVICES, MARKETPLACE_SERVICES, FORUM_REACTIONS]
  inviteeBonusEnabled: { default: false }
  inviteeBonusAmount: { min: 0, max: 5000, default: 0, step: 50 }
  globalBudgetPerMonth: { min: 0, max: 1000000, default: null }
  # Tree explorer: branch fan-out & depth distribution along studied path
  tree:
    avgInviteesPerInviterPerMonth: { min: 0, max: 20, default: 1.2, step: 0.1 }
    branchStudyDepth: { min: 1, max: 5, default: 3, step: 1 }
    # Per-level share of payouts along studied branch (sum ≤ 100%)
    payoutDistributionByDepth:
      default: [70, 20, 10]

# ── Costs & break-even ─────────────────────────────────────────────────────
# Rule: editing line items → recalculates totalMonthlyBurn slider.
#       dragging totalMonthlyBurn manually → updates breakEvenMonth only (items unchanged).
costs:
  totalMonthlyBurn:
    min: 0
    max: 500000
    default: 25000
    step: 1000
    label: Точка окупаемости (месячный burn, ₽)
  items:
    hosting:
      { min: 0, max: 50000, default: 8000, step: 500, unit: RUB_per_month, label: Хостинг / VPS }
    cdn_and_storage:
      { min: 0, max: 20000, default: 1500, step: 100, unit: RUB_per_month }
    logto_and_auth:
      { min: 0, max: 30000, default: 0, step: 500, unit: RUB_per_month }
    novu_notifications:
      { min: 0, max: 20000, default: 0, step: 500, unit: RUB_per_month }
    payment_processor_percent:
      { min: 0, max: 10, default: 2.5, step: 0.1, unit: percent_of_deposits }
    acquiring_fixed_per_month:
      { min: 0, max: 10000, default: 0, step: 100, unit: RUB_per_month }
    tax_percent_of_net:
      { min: 0, max: 30, default: 6, step: 0.5, unit: percent_of_net_revenue }
    salaries:
      { min: 0, max: 500000, default: 12000, step: 1000, unit: RUB_per_month }
    moderation_contract:
      { min: 0, max: 100000, default: 0, step: 1000, unit: RUB_per_month }
    legal_accounting:
      { min: 0, max: 50000, default: 3000, step: 500, unit: RUB_per_month }
    misc_buffer:
      { min: 0, max: 50000, default: 500, step: 500, unit: RUB_per_month }

# ── Preset multipliers (applied when user picks scenario) ──────────────────
scenarioMultipliers:
  base:
    registrations: 1.0
    planMixPro: 1.0
    attachRates: 1.0
    churn: 1.0
  optimistic:
    registrations: 1.5
    planMixPro: 1.4
    attachRates: 1.3
    churn: 0.7
  pessimistic:
    registrations: 0.6
    planMixPro: 0.7
    attachRates: 0.8
    churn: 1.4
