name: Sync secrets (dev)

# Manual only: push app secrets from GitHub Secrets → Swarm (tavrida_dev_*).
# Does not rebuild images. After --force rotation, run Deploy dev (redeploy).

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Recreate existing Swarm secrets'
        required: true
        type: boolean
        default: true
      redeploy:
        description: 'Also run stack deploy after sync'
        required: false
        type: boolean
        default: true

concurrency:
  group: sync-secrets-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  DOCKER_CONTEXT: dev-swarm

jobs:
  sync:
    name: Sync Swarm secrets
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v5

      - name: Write public dev.env
        env:
          DEV_DOMAIN: ${{ vars.DEV_DOMAIN }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
          TAVRIDA_REPO_ROOT: ${{ vars.TAVRIDA_REPO_ROOT || '/opt/tavrida' }}
          GHCR_OWNER: ${{ vars.GHCR_OWNER || github.repository_owner }}
          LOGTO_ENDPOINT: ${{ vars.LOGTO_ENDPOINT }}
          LOGTO_JWKS_URL: ${{ vars.LOGTO_JWKS_URL }}
          LOGTO_AUDIENCE: ${{ vars.LOGTO_AUDIENCE }}
          LOGTO_M2M_APP_ID: ${{ vars.LOGTO_M2M_APP_ID }}
          LOGTO_M2M_RESOURCE: ${{ vars.LOGTO_M2M_RESOURCE }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN }}
          VITE_LOGTO_ENDPOINT: ${{ vars.VITE_LOGTO_ENDPOINT }}
          VITE_LOGTO_APP_ID: ${{ vars.VITE_LOGTO_APP_ID }}
          VITE_LOGTO_API_RESOURCE: ${{ vars.VITE_LOGTO_API_RESOURCE }}
        run: |
          export GIT_SHA="${GITHUB_SHA:0:7}"
          ./docker/swarm/ci-write-dev-env.sh

      - name: Write dev.secrets.env
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          LOGTO_M2M_APP_SECRET: ${{ secrets.LOGTO_M2M_APP_SECRET }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
        run: |
          {
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}"
            echo "MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}"
            echo "LOGTO_M2M_APP_SECRET=${LOGTO_M2M_APP_SECRET}"
            echo "INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}"
          } > docker/swarm/dev.secrets.env

      - name: Start SSH agent
        env:
          DEV_SWARM_SSH_KEY: ${{ secrets.DEV_SWARM_SSH_KEY }}
        run: ./docker/swarm/ci-ssh-agent.sh

      - name: Docker context → Swarm
        env:
          DEV_SWARM_SSH_HOST: ${{ vars.DEV_SWARM_SSH_HOST }}
          DEV_SWARM_SSH_USER: ${{ vars.DEV_SWARM_SSH_USER }}
        run: ./docker/swarm/ci-docker-context.sh

      - name: Sync secrets
        run: |
          ARGS=()
          if [[ "${{ inputs.force }}" == "true" ]]; then
            ARGS+=(--force)
          fi
          DOCKER_CONTEXT=dev-swarm ./docker/swarm/sync-secrets-dev.sh "${ARGS[@]}"

      - name: Redeploy stack
        if: ${{ inputs.redeploy }}
        env:
          DOCKER_CONTEXT: dev-swarm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker --context "$DOCKER_CONTEXT" login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
          ./docker/swarm/deploy-dev.sh

      - name: Summary
        run: |
          {
            echo "### Secrets sync (dev)"
            echo "- force: \`${{ inputs.force }}\`"
            echo "- redeploy: \`${{ inputs.redeploy }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
