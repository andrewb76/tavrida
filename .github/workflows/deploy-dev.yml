name: Deploy dev (Swarm)

# Build → GHCR → docker stack deploy via SSH Docker context.
# App secrets are NOT touched here — use workflow "Sync secrets (dev)" when rotating.

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: 'Image tag (empty = short GITHUB_SHA)'
        required: false
        type: string
      skip_build:
        description: 'Skip build/push (deploy existing tag only)'
        required: false
        type: boolean
        default: false
  push:
    branches: [dev]
    paths:
      - 'services/**'
      - 'apps/frontend/**'
      - 'packages/**'
      - 'config/**'
      - 'docker/**'
      - '.github/workflows/deploy-dev.yml'

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  DOCKER_CONTEXT: dev-swarm

jobs:
  deploy:
    name: Build + deploy
    runs-on: ubuntu-latest
    environment: dev
    steps:
      # On push: exact SHA. On manual run: always tip of `dev` (UI often defaults to master,
      # whose stack files still have compose `name:` rejected by `docker stack deploy`).
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'push' && github.sha || 'dev' }}

      - name: Resolve image tag
        id: tag
        env:
          INPUT_SHA: ${{ inputs.git_sha }}
        run: |
          if [[ -n "${INPUT_SHA}" ]]; then
            echo "git_sha=${INPUT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "git_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Environment vars
        id: envcheck
        env:
          DEV_DOMAIN: ${{ vars.DEV_DOMAIN }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
          DEV_SWARM_SSH_HOST: ${{ vars.DEV_SWARM_SSH_HOST }}
          DEV_SWARM_SSH_USER: ${{ vars.DEV_SWARM_SSH_USER }}
        run: |
          missing=()
          [[ -z "${DEV_DOMAIN}" ]] && missing+=(DEV_DOMAIN)
          [[ -z "${ACME_EMAIL}" ]] && missing+=(ACME_EMAIL)
          [[ -z "${DEV_SWARM_SSH_HOST}" ]] && missing+=(DEV_SWARM_SSH_HOST)
          [[ -z "${DEV_SWARM_SSH_USER}" ]] && missing+=(DEV_SWARM_SSH_USER)
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Deploy skipped"
              echo "GitHub Environment \`dev\` missing: \`${missing[*]}\`"
              echo "See [github-actions.md](docs/04-deployment/github-actions.md)"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Deploy skipped — configure Environment 'dev' vars: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write public dev.env
        if: steps.envcheck.outputs.ready == 'true'
        env:
          DEV_DOMAIN: ${{ vars.DEV_DOMAIN }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
          TAVRIDA_REPO_ROOT: ${{ vars.TAVRIDA_REPO_ROOT || '/opt/tavrida' }}
          GHCR_OWNER: ${{ vars.GHCR_OWNER || github.repository_owner }}
          GIT_SHA: ${{ steps.tag.outputs.git_sha }}
          LOGTO_ENDPOINT: ${{ vars.LOGTO_ENDPOINT }}
          LOGTO_JWKS_URL: ${{ vars.LOGTO_JWKS_URL }}
          LOGTO_AUDIENCE: ${{ vars.LOGTO_AUDIENCE }}
          LOGTO_M2M_APP_ID: ${{ vars.LOGTO_M2M_APP_ID }}
          LOGTO_M2M_RESOURCE: ${{ vars.LOGTO_M2M_RESOURCE }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN }}
          VITE_LOGTO_ENDPOINT: ${{ vars.VITE_LOGTO_ENDPOINT }}
          VITE_LOGTO_APP_ID: ${{ vars.VITE_LOGTO_APP_ID }}
          VITE_LOGTO_API_RESOURCE: ${{ vars.VITE_LOGTO_API_RESOURCE }}
        run: ./docker/swarm/ci-write-dev-env.sh

      - name: Log in to GHCR
        if: ${{ steps.envcheck.outputs.ready == 'true' && (github.event_name == 'push' || inputs.skip_build != true) }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ steps.envcheck.outputs.ready == 'true' && (github.event_name == 'push' || inputs.skip_build != true) }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push images
        if: ${{ steps.envcheck.outputs.ready == 'true' && (github.event_name == 'push' || inputs.skip_build != true) }}
        env:
          GHCR_OWNER: ${{ vars.GHCR_OWNER || github.repository_owner }}
          GIT_SHA: ${{ steps.tag.outputs.git_sha }}
          DEV_DOMAIN: ${{ vars.DEV_DOMAIN }}
          VITE_LOGTO_ENDPOINT: ${{ vars.VITE_LOGTO_ENDPOINT }}
          VITE_LOGTO_APP_ID: ${{ vars.VITE_LOGTO_APP_ID }}
          VITE_LOGTO_API_RESOURCE: ${{ vars.VITE_LOGTO_API_RESOURCE }}
        run: ./docker/swarm/build-images.sh --push

      - name: Start SSH agent
        if: steps.envcheck.outputs.ready == 'true'
        env:
          DEV_SWARM_SSH_KEY: ${{ secrets.DEV_SWARM_SSH_KEY }}
        run: ./docker/swarm/ci-ssh-agent.sh

      - name: Docker context → Swarm
        if: steps.envcheck.outputs.ready == 'true'
        env:
          DEV_SWARM_SSH_HOST: ${{ vars.DEV_SWARM_SSH_HOST }}
          DEV_SWARM_SSH_USER: ${{ vars.DEV_SWARM_SSH_USER }}
        run: ./docker/swarm/ci-docker-context.sh

      - name: Registry auth on context (for --with-registry-auth)
        if: steps.envcheck.outputs.ready == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker --context "$DOCKER_CONTEXT" login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Stack deploy
        if: steps.envcheck.outputs.ready == 'true'
        env:
          DOCKER_CONTEXT: dev-swarm
        run: ./docker/swarm/deploy-dev.sh

      - name: Summary
        if: steps.envcheck.outputs.ready == 'true'
        run: |
          {
            echo "### Dev deploy"
            echo "- tag: \`${{ steps.tag.outputs.git_sha }}\`"
            echo "- app: https://app.${{ vars.DEV_DOMAIN }}"
            echo "- api: https://api.${{ vars.DEV_DOMAIN }}/api/v1"
          } >> "$GITHUB_STEP_SUMMARY"
