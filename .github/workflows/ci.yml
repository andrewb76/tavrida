name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 11.13.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Lint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: write
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 11.13.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --continue: collect JUnit from as many packages as possible even if one fails
      - name: Test
        run: pnpm exec turbo run test --continue

      - name: Upload JUnit XML
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: '**/test-results/junit.xml'
          if-no-files-found: warn
          retention-days: 14

      - name: Publish Test Results
        id: test-results
        if: ${{ !cancelled() }}
        uses: EnricoMi/publish-unit-test-result-action@v2.24.0
        with:
          files: |
            **/test-results/junit.xml
          check_name: Test Results
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      # Badge from JSON output — see marketplace «Create a badge from test results»
      - name: Set badge color
        if: ${{ !cancelled() && github.ref == 'refs/heads/master' }}
        shell: bash
        run: |
          case ${{ fromJSON(steps['test-results'].outputs.json).conclusion }} in
            success)
              echo "BADGE_COLOR=31c653" >> "$GITHUB_ENV"
              ;;
            failure)
              echo "BADGE_COLOR=800000" >> "$GITHUB_ENV"
              ;;
            *)
              echo "BADGE_COLOR=696969" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Create badge
        if: ${{ !cancelled() && github.ref == 'refs/heads/master' }}
        uses: emibcn/badge-action@08035948ff5f54556cbcfae9d8a8c7de92616797 # v2.0.3
        with:
          label: Tests
          status: >-
            ${{ fromJSON(steps['test-results'].outputs.json).formatted.stats.tests }}
            tests,
            ${{ fromJSON(steps['test-results'].outputs.json).formatted.stats.runs }}
            runs:
            ${{ fromJSON(steps['test-results'].outputs.json).conclusion }}
          color: ${{ env.BADGE_COLOR }}
          path: badge.svg

      - name: Stage badge for publish
        if: ${{ !cancelled() && github.ref == 'refs/heads/master' }}
        run: |
          mkdir -p badge-publish
          cp badge.svg badge-publish/badge.svg

      # Host SVG on orphan branch `badges` (same idea as marketplace gist upload; no GIST_TOKEN)
      - name: Publish badge branch
        if: ${{ !cancelled() && github.ref == 'refs/heads/master' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badge-publish
          publish_branch: badges
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'chore: update test results badge'

  build:
    name: Build (turbo)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 11.13.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm exec turbo run build --filter=@tavrida/frontend

      - name: Build docs (PR only)
        if: github.event_name == 'pull_request'
        run: pnpm docs:build
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/
