name: Docs (GitHub Pages)

# Требуется один раз: Settings → Pages → Source: GitHub Actions
# https://github.com/andrewb76/tavrida/settings/pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 11.13.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static docs
        run: pnpm docs:build
        env:
          # Project site: https://<org>.github.io/<repo>/
          VITEPRESS_BASE: /${{ github.event.repository.name }}/

      - name: Verify key pages in dist
        run: |
          dist=apps/docs-site/.vitepress/dist
          test -f "$dist/index.html"
          test -f "$dist/11-ux-ui/screen-tree.html"
          test -f "$dist/00-meta/DOCS-ROADMAP.html"
          echo "OK: index, screen-tree, DOCS-ROADMAP"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs-site/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
